<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Cup - Login</title>
    <link rel="stylesheet" href="ONE.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body class="page-login">

    <div class="login-container">
        <h2>Login to BLACK CUP</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group password-input">
                <label>Password</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" required>

                    
                </div>


            </div>
            <div class="options"
                style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px;">
                <label style="color:#aaa;"><input type="checkbox" style="width:auto; margin-right:5px;"> Remember
                    me</label>
                <a href="#" style="color:#d4af37;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">LOGIN</button>
        </form>
        <p class="text-center mt-2" style="font-size:14px; color:#aaa;">
            Don't have an account? <a href="REGISTER.html" style="color:#d4af37;">Sign up</a>
        </p>
    </div>

    <script src="ONE.js"></script>
</body>

</html>
