<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Settings</title>
<link rel="stylesheet" href="ONE.css">
</head>
<body>

<h1>System Settings</h1>

<form id="settingsForm">

    <div class="input-group">
        <label>Store Name</label>
        <input type="text" id="store_name">
    </div>

    <div class="input-group">
        <label>Store Contact</label>
        <input type="text" id="store_contact">
    </div>

    <div class="input-group">
        <label>GCash Number</label>
        <input type="text" id="gcash_number">
    </div>

    <div class="input-group">
        <label>PayMaya Number</label>
        <input type="text" id="paymaya_number">
    </div>

    <div class="input-group">
        <label>Delivery Rate Per KM</label>
        <input type="number" id="delivery_rate_per_km">
    </div>

    <div class="input-group">
        <label>Loyalty Points Per Item</label>
        <input type="number" id="loyalty_points_per_item">
    </div>

    <div class="input-group">
        <label>Terms and Conditions</label>
        <textarea id="terms_and_conditions"></textarea>
    </div>

    <button type="submit">SAVE SETTINGS</button>

</form>

<script src="ONE.js"></script>

</body>
</html>
